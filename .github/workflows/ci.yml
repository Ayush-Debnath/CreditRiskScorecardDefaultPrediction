name: Credit Risk Scorecard CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi duckdb pandas numpy \
                      scikit-learn xgboost joblib scipy pydantic \
                      python-dotenv mlflow uvicorn

      - name: Run tests
        run: pytest tests/ -v